# Local development infrastructure for Cougny.
# Postgres credentials default to `cougny`; override via shell env if needed.
#   pnpm infra:up   /   pnpm infra:down
name: cougny

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cougny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cougny}
      POSTGRES_DB: ${POSTGRES_DB:-cougny}
    ports:
      - '5432:5432'
    volumes:
      # Postgres 18+ images store data under a major-version subdirectory, so the
      # volume mounts at /var/lib/postgresql (not the legacy .../data path).
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cougny}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ['redis-server', '--save', '', '--appendonly', 'no']

  # Self-hosted TURN/STUN. Uses the REST-API shared-secret scheme; the API mints
  # ephemeral credentials from the same TURN_STATIC_AUTH_SECRET.
  coturn:
    image: coturn/coturn:4.6-alpine
    restart: unless-stopped
    ports:
      - '3478:3478/tcp'
      - '3478:3478/udp'
      - '49160-49200:49160-49200/udp'
    command:
      - --listening-port=3478
      - --fingerprint
      - --use-auth-secret
      - --static-auth-secret=${TURN_STATIC_AUTH_SECRET:-dev-turn-shared-secret-change-me}
      - --realm=cougny.local
      - --min-port=49160
      - --max-port=49200
      - --no-tls
      - --no-dtls
      - --log-file=stdout

volumes:
  pgdata:
