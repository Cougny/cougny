name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Knip (unused files, dependencies, exports)
        run: pnpm knip

      - name: Build
        run: pnpm build
        env:
          # Build-time defaults so the web app compiles without live services.
          AUTH_JWT_SECRET: ci-placeholder-secret-value
          TURN_STATIC_AUTH_SECRET: ci-placeholder-turn
