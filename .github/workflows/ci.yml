name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: cougny
          POSTGRES_PASSWORD: cougny
          POSTGRES_DB: cougny
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cougny"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      # Schema changes must ship as committed migrations (never `db push`):
      # prove they apply cleanly to a fresh database…
      - name: Apply migrations
        run: pnpm --filter @cougny/db migrate:deploy
        env:
          DATABASE_URL: postgresql://cougny:cougny@localhost:5432/cougny?schema=public

      # …and that schema.prisma has no drift the migrations don't capture.
      - name: Check for schema drift
        run: >-
          pnpm --filter @cougny/db exec prisma migrate diff
          --from-config-datasource --to-schema prisma/schema.prisma --exit-code
        env:
          DATABASE_URL: postgresql://cougny:cougny@localhost:5432/cougny?schema=public

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Knip (unused files, dependencies, exports)
        run: pnpm knip

      - name: Build
        run: pnpm build
        env:
          # Build-time defaults so the web app compiles without live services.
          AUTH_JWT_SECRET: ci-placeholder-secret-value
          TURN_STATIC_AUTH_SECRET: ci-placeholder-turn
