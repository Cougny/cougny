name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        # Pinned to an immutable commit SHA: this job runs on pull_request_target
        # with write permissions, so a mutable version tag is a supply-chain risk.
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: 'https://github.com/Cougny/cougny/blob/main/CLA.md'
          path-to-signatures: 'signatures/cla.json'
          branch: 'cla-signatures'
          # Repo owners and bots are exempt from signing.
          allowlist: 'yourscemal,Bluenovers,dependabot[bot],github-actions[bot]'
